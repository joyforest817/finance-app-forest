<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Finance App</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-100 p-5">
  <div id="root"></div>

  <script type="text/babel">

    function FinanceApp() {
      const [transactions, setTransactions] = React.useState([]);
      const [amount, setAmount] = React.useState("");
      const [category, setCategory] = React.useState("");
      const [date, setDate] = React.useState("");

      const addTransaction = () => {
        if (!amount || !category || !date) return;

        const newTx = {
          id: Date.now(),
          amount: Number(amount),
          category,
          date,
          type: Number(amount) > 0 ? "income" : "expense"
        };

        setTransactions([...transactions, newTx]);
        setAmount("");
        setCategory("");
        setDate("");
      };

      const deleteTransaction = (id) => {
        setTransactions(transactions.filter(tx => tx.id !== id));
      };

      const balance = transactions.reduce((acc, tx) => acc + tx.amount, 0);

      return (
        <div className="max-w-md mx-auto bg-white p-4 rounded shadow">
          <h1 className="text-xl font-bold mb-3">💰 금융관리</h1>

          <div className="mb-3">
            <input
              className="border p-1 mr-1 w-24"
              placeholder="금액"
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
            />
            <input
              className="border p-1 mr-1 w-24"
              placeholder="카테고리"
              value={category}
              onChange={(e) => setCategory(e.target.value)}
            />
            <input
              type="date"
              className="border p-1 mr-1"
              value={date}
              onChange={(e) => setDate(e.target.value)}
            />
            <button
              onClick={addTransaction}
              className="bg-blue-500 text-white px-2 py-1 rounded"
            >
              추가
            </button>
          </div>

          <div className="mb-3 font-bold">
            잔액: {balance.toLocaleString()}원
          </div>

          <table className="w-full text-sm">
            <thead>
              <tr>
                <th>날짜</th>
                <th>카테고리</th>
                <th>금액</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {transactions.map(tx => (
                <tr key={tx.id}>
                  <td>{tx.date}</td>
                  <td>{tx.category}</td>
                  <td className={tx.type === "income" ? "text-green-500" : "text-red-500"}>
                    {tx.amount.toLocaleString()}
                  </td>
                  <td>
                    <button
                      onClick={() => deleteTransaction(tx.id)}
                      className="text-white bg-red-500 px-2 rounded"
                    >
                      삭제
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<FinanceApp />);

  </script>
</body>
</html>
